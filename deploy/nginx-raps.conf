# /etc/nginx/sites-available/raps
# Symlink to sites-enabled, then `sudo nginx -t && sudo systemctl reload nginx`.
# Replace erp.yourdomain.com with your real DNS name before enabling SSL.

# Redirect HTTP -> HTTPS (certbot will inject SSL block when you run it)
server {
    listen 80;
    server_name erp.yourdomain.com;

    # Let certbot solve ACME challenges
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name erp.yourdomain.com;

    # certbot will fill these in after `certbot --nginx -d erp.yourdomain.com`
    # ssl_certificate     /etc/letsencrypt/live/erp.yourdomain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/erp.yourdomain.com/privkey.pem;

    # Built React app (vite build output)
    root /var/www/raps/client/dist;
    index index.html;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # Static assets — long cache
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # API -> Node backend on 4000
    location /api/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 300;
        client_max_body_size 25m;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Basic security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
